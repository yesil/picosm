name: Bug report
description: Report a problem with picosm
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or a code snippet that reproduces the issue.
      render: javascript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: picosm version
      placeholder: e.g. 2.2.1
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser / Node version, bundler, framework (e.g. Lit).
    validations:
      required: false
